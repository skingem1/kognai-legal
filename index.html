<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kognai — Sovereign AI Runtime</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e5e5e5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .container { max-width: 640px; text-align: center; }
    h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: -0.03em; color: #fff; margin-bottom: 1rem; }
    p { font-size: 1.1rem; line-height: 1.7; color: #999; margin-bottom: 2rem; }
    .links { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
    a { color: #666; text-decoration: none; font-size: 0.9rem; border-bottom: 1px solid #333; padding-bottom: 2px; transition: color 0.2s, border-color 0.2s; }
    a:hover { color: #e5e5e5; border-color: #999; }
    .badge { display: inline-block; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 4px; padding: 0.25rem 0.75rem; font-size: 0.8rem; color: #555; margin-bottom: 2rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Phase 1 — TikTok Content Agent</div>
    <h1>Kognai</h1>
    <p>Sovereign AI runtime for autonomous content operations. Kognai discovers and publishes high-quality archive media to TikTok using a multi-agent pipeline.</p>

      <a href="tos/">Terms of Service</a>
